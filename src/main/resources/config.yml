settings:
  minimum-bounty: 1000
  high-bounty-threshold: 50000
  tax-percentage: 5.0

messages:
  prefix: "<gray>SMORKIBOUNTY » </gray>"
  bounty-placed: "<gray>A bounty of $%amount% has been placed on %player%!</gray>"
  bounty-claimed-high: "<gray>LEGENDARY HUNT! %killer% has executed %victim% and claimed a massive bounty of $%amount%!</gray>"
  bounty-claimed-normal: "<gray>%killer% claimed the $%amount% bounty on %victim%.</gray>"
  insufficient-funds: "<gray>You do not have enough money in your account!</gray>"

gui:
  title: "<gray>Bounties</gray>"
  border-item: "BLACK_STAINED_GLASS_PANE"
  skull-name: "<gray>%target_player%</gray>"
  skull-lore:
    - "<dark_gray>----------------------</dark_gray>"
    - "<gray>Current Bounty: <gold>$%amount%</gold></gray>"
    - "<gray>Status: <red>Wanted Dead</red></gray>"
    - "<dark_gray>----------------------</dark_gray>"
